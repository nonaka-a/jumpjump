<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MAIMAI'S JUNPJUNP!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ゲーム中UI -->
<div id="gameUI">
    ALTITUDE: <span id="heightScore">0</span> m
    <div id="powerUI">RED AURA: <span id="timer">10</span>s</div>
</div>

<!-- タイトル画面 -->
<div id="titleScreen" class="screen">
    <div class="screen-box">
        <h1>MAIMAI'S JUNPJUNP!</h1>
        <div class="stat-text">HIGH SCORE: <span id="titleHigh">0</span> m</div>
        <div class="stat-text gp-text">TOTAL GP: <span id="titleGp">0</span></div>
        <div class="btn-group-vertical">
            <button onclick="changeState('play')" style="background: #ff3366; color: white;">JUMP (START)</button>
            <button onclick="changeState('shop')">SHOP</button>
        </div>
    </div>
</div>

<!-- ショップ画面 -->
<div id="shopScreen" class="screen" style="display: none;">
    <div class="screen-box" style="padding: 20px; max-width: 450px;">
        <h2>UPGRADE SHOP</h2>
        <div class="stat-text gp-text" style="margin-bottom: 20px;">GP: <span id="shopGp">0</span></div>
        
        <div id="shopList">
            <!-- JavaScriptで動的に生成されます -->
        </div>

        <button onclick="changeState('title')" style="margin-top: 20px; width: 220px;">BACK TO TITLE</button>
    </div>
</div>

<!-- リザルト画面 -->
<div id="resultScreen" class="screen" style="display: none;">
    <div class="screen-box">
        <h1 id="resultTitle">GAME OVER</h1>
        <div class="stat-text">Reached: <span id="resultHeight">0</span> m</div>
        <div class="stat-text gp-text">Earned GP: +<span id="resultEarned">0</span></div>
        <div class="btn-group-vertical">
            <button onclick="changeState('play')" style="background: #ff3366; color: white;">RETRY</button>
            <button onclick="changeState('title')">TITLE</button>
        </div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="script.js"></script>
</body>
</html>
